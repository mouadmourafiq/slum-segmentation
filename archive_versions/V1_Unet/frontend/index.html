<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slum AI Explorer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <div class="logo-area">
                <span class="pulse-dot"></span>
                <h1>Slum AI Explorer</h1>
            </div>
            <p>Advanced Satellite Imagery Segmentation using Region-Aware MoE</p>
        </header>

        <main>
            <!-- Map Container -->
            <div id="map-container">
                <div id="map"></div>
                
                <!-- Upload Overlay -->
                <div id="upload-overlay" class="upload-overlay active">
                    <div class="upload-box" id="drop-zone">
                        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <h3>Drag & Drop Satellite TIF</h3>
                        <p>or click to browse</p>
                        <input type="file" id="file-input" accept=".tif,.tiff,.jpg,.png" hidden>
                    </div>
                </div>

                <!-- Loading Spinner -->
                <div id="loading-overlay" class="loading-overlay">
                    <div class="spinner"></div>
                    <p>AI is analyzing the architecture...</p>
                </div>
            </div>
        </main>
        
        <footer>
            <button id="reset-btn" class="btn hidden">Analyze New Image</button>
            <div class="stats" id="stats-container">
                <span>Model: <strong>SegFormer-B0</strong></span>
                <span>Mode: <strong>Unsupervised TTA</strong></span>
            </div>
        </footer>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom JS -->
    <script src="/static/app.js"></script>
</body>
</html>
